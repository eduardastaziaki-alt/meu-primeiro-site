<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Atividades Infantis - 50 Espaços</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
            font-style: italic;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border-color: #667eea;
        }

        .card-imagem {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: linear-gradient(45deg, #f3f3f3, #e0e0e0);
        }

        .card-info {
            padding: 12px;
            text-align: center;
        }

        .card-info h3 {
            color: #333;
            font-size: 1em;
            margin-bottom: 5px;
        }

        .card-info p {
            color: #666;
            font-size: 0.85em;
        }

        /* Estilo para imagens de placeholder */
        .placeholder-img {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
        }

        /* Cores diferentes para os placeholders */
        .card:nth-child(5n+1) .placeholder-img {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }
        .card:nth-child(5n+2) .placeholder-img {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }
        .card:nth-child(5n+3) .placeholder-img {
            background: linear-gradient(135deg, #fad0c4 0%, #ffd1ff 100%);
        }
        .card:nth-child(5n+4) .placeholder-img {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        .contador {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .contador span {
            font-size: 1.5em;
            margin: 0 5px;
        }

        .mensagem {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Galeria de Atividades Infantis 🎨</h1>
        <div class="subtitle">50 espaços para imagens de atividades divertidas!</div>
        
        <div class="galeria" id="galeria">
            <!-- Os cards serão gerados dinamicamente via JavaScript -->
        </div>

        <div class="contador">
            📸 Total de espaços: <span id="totalCards">0</span> imagens
        </div>
        <div class="mensagem">
            ✨ Clique nos cards para ver a atividade em destaque! ✨
        </div>
    </div>

    <script>
        // Array com exemplos de atividades infantis (para preencher os 50 espaços)
        const atividades = [
            { nome: "Pintura com Dedos", categoria: "Artes", imagem: "https://images.unsplash.com/photo-1584697964408-88c235b06c9e?w=200&h=150&fit=crop" },
            { nome: "Leitura de Histórias", categoria: "Literatura", imagem: "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=200&h=150&fit=crop" },
            { nome: "Brincar com Blocos", categoria: "Construção", imagem: "https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=200&h=150&fit=crop" },
            { nome: "Dança Divertida", categoria: "Música", imagem: "https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=200&h=150&fit=crop" },
            { nome: "Jogos de Tabuleiro", categoria: "Raciocínio", imagem: "https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?w=200&h=150&fit=crop" },
            { nome: "Teatro de Fantoches", categoria: "Expressão", imagem: "https://images.unsplash.com/photo-1596461404969-9ae70f2830c5?w=200&h=150&fit=crop" },
            { nome: "Experiências Científicas", categoria: "Ciência", imagem: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=200&h=150&fit=crop" },
            { nome: "Quebra-Cabeças", categoria: "Lógica", imagem: "https://images.unsplash.com/photo-1587653915936-5623ea0b949a?w=200&h=150&fit=crop" },
            { nome: "Desenho e Pintura", categoria: "Artes", imagem: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=200&h=150&fit=crop" },
            { nome: "Brincadeiras ao Ar Livre", categoria: "Movimento", imagem: "https://images.unsplash.com/photo-1472162072942-cd5147eb3902?w=200&h=150&fit=crop" },
            { nome: "Massinha de Modelar", categoria: "Artes", imagem: "https://images.unsplash.com/photo-1584697964408-88c235b06c9e?w=200&h=150&fit=crop" },
            { nome: "Contação de Histórias", categoria: "Literatura", imagem: "https://images.unsplash.com/photo-1512820790803-83ca734da794?w=200&h=150&fit=crop" },
            { nome: "Lego e Construção", categoria: "Construção", imagem: "https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=200&h=150&fit=crop" },
            { nome: "Música e Ritmo", categoria: "Música", imagem: "https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?w=200&h=150&fit=crop" },
            { nome: "Jogos de Memória", categoria: "Raciocínio", imagem: "https://images.unsplash.com/photo-1610890716171-6b1bb98ffd09?w=200&h=150&fit=crop" },
            { nome: "Fantoches", categoria: "Expressão", imagem: "https://images.unsplash.com/photo-1596461404969-9ae70f2830c5?w=200&h=150&fit=crop" },
            { nome: "Pequenos Cientistas", categoria: "Ciência", imagem: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=200&h=150&fit=crop" },
            { nome: "Encaixes", categoria: "Lógica", imagem: "https://images.unsplash.com/photo-1587653915936-5623ea0b949a?w=200&h=150&fit=crop" },
            { nome: "Aquarela", categoria: "Artes", imagem: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=200&h=150&fit=crop" },
            { nome: "Parquinho", categoria: "Movimento", imagem: "https://images.unsplash.com/photo-1472162072942-cd5147eb3902?w=200&h=150&fit=crop" }
        ];

        const galeria = document.getElementById('galeria');
        const totalCardsSpan = document.getElementById('totalCards');

        // Função para criar um card de atividade
        function criarCard(atividade, index) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // Usa a imagem da atividade se disponível, senão usa um placeholder
            if (atividade && atividade.imagem) {
                card.innerHTML = `
                    <img src="${atividade.imagem}" alt="${atividade.nome}" class="card-imagem" onerror="this.src='https://via.placeholder.com/200x150/667eea/ffffff?text=Atividade+${index+1}'">
                    <div class="card-info">
                        <h3>${atividade.nome}</h3>
                        <p>${atividade.categoria}</p>
                    </div>
                `;
            } else {
                // Placeholder com gradiente e número
                const cor1 = ['#667eea', '#764ba2', '#ff9a9e', '#a8edea', '#fbc2eb'][index % 5];
                const cor2 = ['#764ba2', '#667eea', '#fad0c4', '#fed6e3', '#a6c1ee'][index % 5];
                card.innerHTML = `
                    <div class="card-imagem placeholder-img" style="background: linear-gradient(135deg, ${cor1}, ${cor2})">
                        ${index + 1}
                    </div>
                    <div class="card-info">
                        <h3>Espaço ${index + 1}</h3>
                        <p>Adicione uma atividade</p>
                    </div>
                `;
            }
            
            // Adiciona evento de clique para mostrar informações
            card.addEventListener('click', () => {
                const nome = atividade ? atividade.nome : `Espaço ${index + 1}`;
                alert(`🎯 ${nome}\nClique para editar ou adicionar uma imagem!`);
            });
            
            return card;
        }

        // Gera 50 cards (20 com atividades pré-definidas e 30 placeholders)
        for (let i = 0; i < 50; i++) {
            if (i < atividades.length) {
                // Usa as atividades disponíveis
                galeria.appendChild(criarCard(atividades[i], i));
            } else {
                // Cria placeholders para os espaços restantes
                const placeholderAtividade = {
                    nome: `Espaço Criativo ${i + 1}`,
                    categoria: "Adicione uma atividade",
                    imagem: null
                };
                galeria.appendChild(criarCard(placeholderAtividade, i));
            }
        }

        // Atualiza o contador
        totalCardsSpan.textContent = document.querySelectorAll('.card').length;

        // Função para lidar com erros de carregamento de imagens
        function handleImageError(img) {
            img.src = 'https://via.placeholder.com/200x150/667eea/ffffff?text=Imagem+não+encontrada';
        }

        // Adiciona evento de erro a todas as imagens
        document.querySelectorAll('.card-imagem').forEach(img => {
            if (img.tagName === 'IMG') {
                img.addEventListener('error', function() {
                    this.src = 'https://via.placeholder.com/200x150/667eea/ffffff?text=Erro+no+carregamento';
                });
            }
        });
    </script>
</body>
</html>
